<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#412402" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cider Log" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Cider Log</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cider: #C4711A; --cider-light: #FAEEDA; --cider-mid: #EF9F27;
      --cider-dark: #633806; --cider-deep: #412402;
      --green: #1D9E75;
      --text: #1a1a1a; --text-muted: #666; --border: rgba(0,0,0,0.12);
      --surface: #fff; --bg: #f5f0eb;
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; }

    /* HERO */
    .hero { background: #412402; padding: env(safe-area-inset-top, 12px) 1.25rem 1rem; }
    .hero-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
    .hero-title { font-size: 22px; font-weight: 600; color: #FAC775; letter-spacing: -0.3px; }
    .hero-sub { font-size: 13px; color: #EF9F27; }
    .hero-badge { background: #633806; color: #FAC775; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 999px; }
    .apple-strip { display: flex; gap: 6px; margin-top: 10px; }
    .apple { width: 10px; height: 10px; border-radius: 50%; background: #EF9F27; opacity: 0.25; }
    .apple.filled { opacity: 1; }

    /* TABS */
    .tab-bar { display: flex; background: #2C1800; border-bottom: 1px solid #412402; position: sticky; top: 0; z-index: 10; }
    .tab { flex: 1; text-align: center; padding: 13px 4px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: none; color: #BA7517; border-bottom: 2px solid transparent; font-family: inherit; }
    .tab.active { color: #FAC775; border-bottom-color: #EF9F27; }

    .body-pad { padding: 1rem; flex: 1; }
    .section { display: none; }
    .section.visible { display: block; }

    /* FILTER */
    .filter-bar { display: flex; gap: 6px; margin-bottom: 12px; }
    .filter-btn { flex: 1; padding: 9px 0; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-family: inherit; }
    .filter-btn.active { background: #FAEEDA; color: #633806; border-color: #EF9F27; }

    /* BREW CARDS */
    .batch-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.1rem; margin-bottom: 10px; cursor: pointer; border-left: 3px solid #EF9F27; }
    .batch-card.status-secondary { border-left-color: #BA7517; }
    .batch-card.status-bottled { border-left-color: #B4B2A9; }
    .batch-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; gap: 8px; }
    .batch-name { font-size: 15px; font-weight: 600; }
    .batch-date { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .status-pill { font-size: 11px; padding: 3px 9px; border-radius: 999px; font-weight: 600; white-space: nowrap; }
    .sp-primary { background: #E1F5EE; color: #085041; }
    .sp-secondary { background: #FAEEDA; color: #633806; }
    .sp-bottled { background: #f0ede8; color: #5F5E5A; }
    .meta-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .meta { font-size: 12px; color: var(--text-muted); }
    .meta b { color: var(--text); font-weight: 600; }
    .abv-pill { background: #E1F5EE; color: #085041; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; margin-left: auto; }
    .overdue-badge { background: #FCEBEB; color: #A32D2D; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; white-space: nowrap; border: 1px solid #F09595; }
    .due-today-badge { background: #FAEEDA; color: #633806; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; white-space: nowrap; border: 1px solid #EF9F27; }

    /* FORMS */
    .form-wrap { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); padding: 1.25rem; margin-bottom: 1rem; }
    .form-section-label { font-size: 11px; font-weight: 700; color: #BA7517; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #FAEEDA; }
    .form-label { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; display: block; }
    .form-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; margin-top: -4px; font-style: italic; }
    .form-group { margin-bottom: 12px; }
    .form-group:last-child { margin-bottom: 0; }
    input, select, textarea { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 15px; background: var(--surface); color: var(--text); font-family: inherit; -webkit-appearance: none; }
    input:focus, textarea:focus { outline: none; border-color: #EF9F27; box-shadow: 0 0 0 3px rgba(239,159,39,0.15); }
    textarea { resize: vertical; min-height: 72px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-primary { background: #412402; color: #FAC775; border: none; border-radius: 10px; padding: 14px 0; width: 100%; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-primary:active { background: #633806; }
    .btn-secondary { background: none; color: var(--text-muted); border: 1px solid var(--border); border-radius: 10px; padding: 12px 0; width: 100%; font-size: 15px; cursor: pointer; margin-top: 8px; font-family: inherit; }

    /* DETAIL HEADER */
    .detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; gap: 12px; }
    .detail-header-left {}
    .detail-title { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
    .detail-sub { font-size: 13px; color: var(--text-muted); }
    .edit-details-btn { background: #FAEEDA; color: #633806; border: 1px solid #EF9F27; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; }
    .edit-details-btn:active { background: #EF9F27; }

    /* STAGE TIMER */
    .stage-timer { border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: space-between; }
    .stage-timer.s-primary { background: #E1F5EE; border: 1px solid #9FE1CB; }
    .stage-timer.s-secondary { background: #FAEEDA; border: 1px solid #FAC775; }
    .stage-timer-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .stage-timer.s-primary .stage-timer-label { color: #0F6E56; }
    .stage-timer.s-secondary .stage-timer-label { color: #854F0B; }
    .stage-timer-name { font-size: 14px; font-weight: 600; }
    .stage-timer.s-primary .stage-timer-name { color: #04342C; }
    .stage-timer.s-secondary .stage-timer-name { color: #412402; }
    .stage-date-row { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .stage-timer-since { font-size: 12px; }
    .stage-timer.s-primary .stage-timer-since { color: #0F6E56; }
    .stage-timer.s-secondary .stage-timer-since { color: #854F0B; }
    .stage-date-edit-btn { background: none; border: none; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; padding: 1px 6px; border-radius: 4px; }
    .stage-timer.s-primary .stage-date-edit-btn { color: #0F6E56; background: rgba(15,110,86,0.1); }
    .stage-timer.s-secondary .stage-date-edit-btn { color: #854F0B; background: rgba(133,79,11,0.1); }
    .stage-date-input-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .stage-date-input-row input[type=date] { padding: 5px 8px; font-size: 13px; border-radius: 6px; flex: 1; min-width: 130px; }
    .stage-date-save-btn { background: #412402; color: #FAC775; border: none; border-radius: 6px; padding: 6px 12px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .stage-days { text-align: right; flex-shrink: 0; }
    .stage-days-num { font-size: 40px; font-weight: 700; line-height: 1; }
    .stage-timer.s-primary .stage-days-num { color: #085041; }
    .stage-timer.s-secondary .stage-days-num { color: #633806; }
    .stage-days-unit { font-size: 12px; font-weight: 600; margin-top: 2px; }
    .stage-timer.s-primary .stage-days-unit { color: #0F6E56; }
    .stage-timer.s-secondary .stage-days-unit { color: #854F0B; }

    /* STATUS SWITCHER */
    .status-switcher { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 1.25rem; }
    .status-opt { padding: 10px 4px; text-align: center; font-size: 12px; font-weight: 600; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-family: inherit; line-height: 1.3; }
    .status-opt.active.s-primary { background: #E1F5EE; color: #085041; border-color: #5DCAA5; }
    .status-opt.active.s-secondary { background: #FAEEDA; color: #633806; border-color: #EF9F27; }
    .status-opt.active.s-bottled { background: #f0ede8; color: #444441; border-color: #B4B2A9; }

    /* INFO GRID */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
    .info-card { background: #FAEEDA; border-radius: 8px; padding: 10px 12px; }
    .info-label { font-size: 11px; color: #854F0B; margin-bottom: 2px; font-weight: 600; }
    .info-val { font-size: 14px; font-weight: 600; color: #412402; word-break: break-word; }

    /* INGREDIENT DISPLAY CARDS */
    .ing-section { border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 1.25rem; background: var(--surface); }
    .ing-section-head { font-size: 11px; font-weight: 700; color: #BA7517; text-transform: uppercase; letter-spacing: .06em; padding: 10px 14px 8px; border-bottom: 1px solid var(--border); background: #FAEEDA; }
    .ing-row { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 14px; border-bottom: 1px solid var(--border); gap: 12px; }
    .ing-row:last-child { border-bottom: none; }
    .ing-name { font-size: 13px; color: var(--text-muted); flex-shrink: 0; }
    .ing-val { font-size: 14px; font-weight: 600; color: var(--text); text-align: right; }

    /* SECTION HEADS */
    .section-head { font-size: 11px; font-weight: 700; color: #BA7517; text-transform: uppercase; letter-spacing: .06em; margin: 1.25rem 0 10px; }

    /* LOG ROWS */
    .log-add { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .log-add input { flex: 1; min-width: 60px; }
    .log-add input.date-inp { width: 136px; flex: none; }
    .log-add input.unit-inp { width: 72px; flex: none; }
    .log-add button { background: #412402; color: #FAC775; border: none; border-radius: 8px; padding: 0 14px; font-size: 14px; cursor: pointer; white-space: nowrap; font-family: inherit; font-weight: 600; min-height: 44px; }
    .log-add button.wide { width: 100%; flex: none; }
    .log-list { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); background: var(--surface); margin-bottom: 1.25rem; }
    .log-empty { font-size: 14px; color: var(--text-muted); padding: 12px 14px; }
    .log-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .log-row:last-child { border-bottom: none; }
    .log-main { font-size: 14px; font-weight: 600; color: var(--text); }
    .log-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .log-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .log-del { background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; padding: 0; font-family: inherit; line-height: 1; }
    .log-del:active { color: #c0392b; }

    /* SCHEDULED DOSE ROWS */
    .sched-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); gap: 8px; }
    .sched-row:last-child { border-bottom: none; }
    .sched-row.overdue { background: #FCEBEB; }
    .sched-row.due-today { background: #FAEEDA; }
    .sched-left { flex: 1; min-width: 0; }
    .sched-main { font-size: 14px; font-weight: 600; }
    .sched-row.overdue .sched-main { color: #A32D2D; }
    .sched-row.due-today .sched-main { color: #633806; }
    .sched-date { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .sched-row.overdue .sched-date { color: #c0392b; }
    .sched-row.due-today .sched-date { color: #854F0B; }
    .sched-tag { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }
    .sched-tag.overdue { background: #F09595; color: #501313; }
    .sched-tag.due-today { background: #FAC775; color: #412402; }
    .sched-tag.upcoming { background: #f0ede8; color: #5F5E5A; }
    .sched-tag.done { background: #E1F5EE; color: #085041; }
    .sched-actions { display: flex; align-items: center; gap: 6px; }
    .done-btn { background: #412402; color: #FAC775; border: none; border-radius: 6px; padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }

    /* BANNERS */
    .overdue-banner { background: #FCEBEB; border: 1px solid #F09595; border-radius: 10px; padding: 12px 14px; margin-bottom: 1.25rem; }
    .overdue-banner-title { font-size: 13px; font-weight: 700; color: #A32D2D; margin-bottom: 4px; }
    .overdue-banner-item { font-size: 13px; color: #791F1F; padding: 2px 0; }
    .due-today-banner { background: #FAEEDA; border: 1px solid #FAC775; border-radius: 10px; padding: 12px 14px; margin-bottom: 1.25rem; }
    .due-today-banner-title { font-size: 13px; font-weight: 700; color: #633806; margin-bottom: 4px; }
    .due-today-banner-item { font-size: 13px; color: #412402; padding: 2px 0; }

    .chart-wrap { background: #f5f0eb; border-radius: 8px; padding: 12px; margin-bottom: 1rem; height: 180px; }
    .sg-trend { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 600; margin-left: 6px; }
    .sg-trend.down { background: #E1F5EE; color: #085041; }
    .sg-trend.same { background: #f0ede8; color: #5F5E5A; }

    .stage-history { border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 1.25rem; }
    .stage-history-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; border-bottom: 1px solid var(--border); background: var(--surface); }
    .stage-history-row:last-child { border-bottom: none; }
    .sh-left { display: flex; align-items: center; gap: 10px; }
    .sh-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .sh-dot.s-primary { background: #1D9E75; }
    .sh-dot.s-secondary { background: #EF9F27; }
    .sh-dot.s-bottled { background: #B4B2A9; }
    .sh-name { font-size: 13px; font-weight: 600; }
    .sh-dates { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .sh-duration { font-size: 13px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
    .sh-duration.ongoing { color: #1D9E75; }

    .back-btn { background: none; border: none; font-size: 14px; color: #BA7517; cursor: pointer; padding: 0; margin-bottom: 1rem; display: flex; align-items: center; gap: 4px; font-family: inherit; font-weight: 600; }
    .delete-btn { background: none; border: 1px solid #f5c6c6; color: #c0392b; border-radius: 10px; padding: 12px 0; width: 100%; font-size: 14px; cursor: pointer; font-family: inherit; margin-top: 1rem; }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
    .stat-card { background: #FAEEDA; border-radius: 8px; padding: 12px; }
    .stat-label { font-size: 11px; color: #854F0B; font-weight: 600; margin-bottom: 4px; }
    .stat-val { font-size: 24px; font-weight: 700; color: #412402; }
    .stat-unit { font-size: 14px; color: #BA7517; font-weight: 400; }
    .export-btn { background: #FAEEDA; color: #633806; border: 1px solid #EF9F27; border-radius: 10px; padding: 12px 0; width: 100%; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px; }

    .empty { text-align: center; padding: 3rem 1rem; }
    .empty-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .start-brew-btn { background: #412402; color: #FAC775; border: none; border-radius: 10px; padding: 14px 0; width: 100%; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 1rem; }
    .start-brew-btn:active { background: #633806; }
  </style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="hero-top">
      <div><div class="hero-title">Cider Log</div><div class="hero-sub" id="hero-sub">0 brews tracked</div></div>
      <div class="hero-badge" id="hero-badge">0 active</div>
    </div>
    <div class="apple-strip" id="apple-strip"></div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="showTab('batches')">Brews</button>
    <button class="tab" onclick="showTab('add')">+ New</button>
    <button class="tab" onclick="showTab('stats')">Stats</button>
    <button class="tab" onclick="showTab('recipes')">Recipes</button>
  </div>

  <!-- BREWS LIST -->
  <div id="sec-batches" class="section visible body-pad">
    <div class="filter-bar">
      <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" id="filter-inprogress" onclick="setFilter('inprogress')">In progress</button>
      <button class="filter-btn" id="filter-finished" onclick="setFilter('finished')">Finished</button>
    </div>
    <div id="batch-list"></div>
  </div>

  <!-- NEW BREW FORM -->
  <div id="sec-add" class="section body-pad">
    <div class="form-wrap">
      <div class="form-section-label">Brew info</div>
      <div class="form-group"><label class="form-label">Batch name / number</label><input id="f-name" placeholder="#3 — Summer Cider" /></div>
      <div class="row2">
        <div class="form-group"><label class="form-label">Quantity</label><input id="f-qty" placeholder="1G" /></div>
        <div class="form-group"><label class="form-label">Start date</label><input id="f-date" type="date" /></div>
      </div>
      <div class="form-group"><label class="form-label">Apple juice / base</label><input id="f-juice" placeholder="Brand, type, volume..." /></div>
    </div>

    <div class="form-wrap">
      <div class="form-section-label">Pre-fermentation</div>
      <p class="form-hint">Added to juice before pitching yeast (e.g. 24–48hrs prior)</p>
      <div class="row2">
        <div class="form-group"><label class="form-label">Campden tablets</label><input id="f-campden" placeholder="e.g. 1 tablet" /></div>
        <div class="form-group"><label class="form-label">Pectic enzyme</label><input id="f-pectic" placeholder="e.g. 0.5 tsp" /></div>
      </div>
      <div class="form-group"><label class="form-label">Acid blend</label><input id="f-acid" placeholder="e.g. 1 tsp" /></div>
      <div class="form-group"><label class="form-label">Other pre-ferm additions</label><input id="f-preferm-other" placeholder="e.g. Bentonite, tannin..." /></div>
    </div>

    <div class="form-wrap">
      <div class="form-section-label">At pitch</div>
      <p class="form-hint">Added when pitching yeast</p>
      <div class="form-group"><label class="form-label">Yeast</label><input id="f-yeast" placeholder="Fleischmann's, EC-1118..." /></div>
      <div class="row2">
        <div class="form-group"><label class="form-label">Sugar type</label><input id="f-sugar-type" placeholder="Brown sugar, honey..." /></div>
        <div class="form-group"><label class="form-label">Sugar quantity</label><input id="f-sugar-qty" placeholder="200g, 1 cup..." /></div>
      </div>
      <div class="form-group"><label class="form-label">Initial nutrient addition</label><input id="f-initial-nutrient" placeholder="e.g. 2g Fermaid-O" /></div>
      <div class="form-group"><label class="form-label">Other at-pitch additions</label><input id="f-pitch-other" placeholder="e.g. Energizer, Go-Ferm..." /></div>
    </div>

    <div class="form-wrap">
      <div class="form-section-label">Fermentation</div>
      <div class="form-group"><label class="form-label">Starting SG</label><input id="f-sg" placeholder="1.055" type="number" step="0.001" /></div>
      <div class="form-group"><label class="form-label">Initial notes</label><textarea id="f-notes" placeholder="Observations, aroma, colour..."></textarea></div>
    </div>
    <button class="btn-primary" onclick="saveBatch()">Save brew</button>
    <button class="btn-secondary" onclick="showTab('batches')">Cancel</button>
  </div>

  <!-- STATS -->
  <div id="sec-stats" class="section body-pad">
    <div class="stat-grid" id="stats-grid"></div>
    <div class="chart-wrap" style="height:200px"><canvas id="stats-chart"></canvas></div>
    <button class="export-btn" onclick="exportCSV()">Export all brews as CSV</button>
  </div>

  <!-- DETAIL -->
  <div id="sec-detail" class="section body-pad">
    <button class="back-btn" onclick="showTab('batches')">← All brews</button>
    <div id="detail-content"></div>
  </div>

  <!-- RECIPES LIST -->
  <div id="sec-recipes" class="section body-pad">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-top:4px">

      <button class="edit-details-btn" onclick="showTab('recipe-add')">+ New recipe</button>
    </div>
    <div id="recipe-list"></div>
  </div>

  <!-- NEW / EDIT RECIPE FORM -->
  <div id="sec-recipe-add" class="section body-pad">
    <div class="detail-header">
      <div class="detail-header-left">
        <div class="detail-title" id="recipe-form-title">New recipe</div>
      </div>
    </div>

      <div class="form-section-label">Recipe info</div>
      <div class="form-group"><label class="form-label">Recipe name</label><input id="rf-name" placeholder="e.g. Classic Dry Cider" /></div>
      <div class="form-group"><label class="form-label">Apple juice / base</label><input id="rf-juice" placeholder="Brand, type, volume..." /></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea id="rf-notes" placeholder="Style, target profile, tips..."></textarea></div>
    </div>
    <div class="form-wrap">
      <div class="form-section-label">Pre-fermentation</div>
      <p class="form-hint">Added to juice before pitching yeast</p>
      <div class="row2">
        <div class="form-group"><label class="form-label">Campden tablets</label><input id="rf-campden" placeholder="e.g. 1 tablet" /></div>
        <div class="form-group"><label class="form-label">Pectic enzyme</label><input id="rf-pectic" placeholder="e.g. 0.5 tsp" /></div>
      </div>
      <div class="form-group"><label class="form-label">Acid blend</label><input id="rf-acid" placeholder="e.g. 1 tsp" /></div>
      <div class="form-group"><label class="form-label">Other pre-ferm additions</label><input id="rf-preferm-other" placeholder="e.g. Bentonite, tannin..." /></div>
    </div>
    <div class="form-wrap">
      <div class="form-section-label">At pitch</div>
      <p class="form-hint">Added when pitching yeast</p>
      <div class="form-group"><label class="form-label">Yeast</label><input id="rf-yeast" placeholder="Fleischmann's, EC-1118..." /></div>
      <div class="row2">
        <div class="form-group"><label class="form-label">Sugar type</label><input id="rf-sugar-type" placeholder="Brown sugar, honey..." /></div>
        <div class="form-group"><label class="form-label">Sugar quantity</label><input id="rf-sugar-qty" placeholder="200g, 1 cup..." /></div>
      </div>
      <div class="form-group"><label class="form-label">Initial nutrient addition</label><input id="rf-initial-nutrient" placeholder="e.g. 2g Fermaid-O" /></div>
      <div class="form-group"><label class="form-label">Other at-pitch additions</label><input id="rf-pitch-other" placeholder="e.g. Energizer, Go-Ferm..." /></div>
    </div>
    <button class="btn-primary" id="rf-save-btn" onclick="saveRecipe()">Save recipe</button>
    <button class="btn-secondary" onclick="cancelRecipeForm()">Cancel</button>
  </div>

  <!-- RECIPE DETAIL -->
  <div id="sec-recipe-detail" class="section body-pad">
    <button class="back-btn" onclick="showTab('recipes')">← Recipes</button>
    <div id="recipe-detail-content"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
let batches=[], currentBatch=null, sgChart=null, statsChart=null, activeFilter='all';
let recipes=[], currentRecipe=null, editingRecipeId=null;

const STATUS={
  primary:{label:'Primary fermentation',short:'Primary',cls:'sp-primary',cardCls:'',optCls:'s-primary',timerCls:'s-primary'},
  secondary:{label:'Secondary / aging',short:'Secondary',cls:'sp-secondary',cardCls:'status-secondary',optCls:'s-secondary',timerCls:'s-secondary'},
  bottled:{label:'Bottled / finished',short:'Bottled',cls:'sp-bottled',cardCls:'status-bottled',optCls:'s-bottled',timerCls:''}
};

function today(){return new Date().toISOString().slice(0,10);}
function daysBetween(a,b){const da=new Date(a),db=new Date(b);da.setHours(0,0,0,0);db.setHours(0,0,0,0);return Math.floor((db-da)/86400000);}
function daysSince(d){return d?daysBetween(d,today()):null;}
function fmtDuration(n){if(n===null||isNaN(n))return'—';if(n===0)return'<1 day';return n===1?'1 day':n+' days';}
function doseStatus(d){if(d.done)return'done';if(d.date<today())return'overdue';if(d.date===today())return'due-today';return'upcoming';}
function overdueCount(b){return(b.nutrientSchedule||[]).filter(d=>!d.done&&d.date<=today()).length;}

function load(){
  try{batches=JSON.parse(localStorage.getItem('cider_batches_v3')||'[]');}catch(e){batches=[];}
  try{recipes=JSON.parse(localStorage.getItem('cider_recipes_v1')||'[]');}catch(e){recipes=[];}
  batches.forEach(b=>{
    if(!b.status)b.status='primary';
    if(!b.stageStartDates)b.stageStartDates={primary:b.startDate||today()};
    if(!b.stageStartDates.primary)b.stageStartDates.primary=b.startDate||today();
    if(!b.stageHistory)b.stageHistory=[];
    if(!b.nutrientLog)b.nutrientLog=[];
    if(!b.nutrientSchedule)b.nutrientSchedule=[];
    if(!b.ingredientLog)b.ingredientLog=[];
    if(!b.tastingLog){b.tastingLog=[];if(b.notes){b.tastingLog.push({date:b.startDate||today(),note:b.notes});b.notes='';}}
  });
  renderBatches();updateHero();
}
function save(){localStorage.setItem('cider_batches_v3',JSON.stringify(batches));updateHero();}
function saveRecipes(){localStorage.setItem('cider_recipes_v1',JSON.stringify(recipes));}

function updateHero(){
  const active=batches.filter(b=>b.status!=='bottled').length;
  document.getElementById('hero-sub').textContent=batches.length+' brew'+(batches.length!==1?'s':'')+' tracked';
  document.getElementById('hero-badge').textContent=active+' active';
  const dots=Math.min(batches.length,12);
  document.getElementById('apple-strip').innerHTML=Array.from({length:Math.max(dots,3)},(_,i)=>`<div class="apple${i<dots?' filled':''}"></div>`).join('');
}

function setFilter(f){
  activeFilter=f;
  ['all','inprogress','finished'].forEach(k=>document.getElementById('filter-'+k).classList.toggle('active',k===f));
  renderBatches();
}

function showTab(t){
  ['batches','add','stats','detail','recipes','recipe-add','recipe-detail'].forEach(s=>document.getElementById('sec-'+s).classList.toggle('visible',s===t));
  const labels={batches:'brews',add:'new',stats:'stats',recipes:'recipes','recipe-add':'recipes','recipe-detail':'recipes'};
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.textContent.trim().toLowerCase().includes(labels[t]||'__')));
  if(t==='stats')renderStats();
  if(t==='add')document.getElementById('f-date').value=today();
  if(t==='recipes'){renderRecipes();}
}

function showDetail(id){
  currentBatch=batches.find(b=>b.id===id);
  if(!currentBatch)return;
  renderDetail();
  ['batches','add','stats'].forEach(s=>document.getElementById('sec-'+s).classList.remove('visible'));
  document.getElementById('sec-detail').classList.add('visible');
}

function calcABV(b){
  const og=parseFloat(b.startingSG);
  const readings=b.sgReadings||[];
  const fg=readings.length?parseFloat(readings[readings.length-1].val):NaN;
  if(isNaN(og)||isNaN(fg)||fg>=og)return null;
  return ((og-fg)*131.25).toFixed(1);
}

function filteredBatches(){
  if(activeFilter==='inprogress')return batches.filter(b=>b.status!=='bottled');
  if(activeFilter==='finished')return batches.filter(b=>b.status==='bottled');
  return batches;
}

function renderBatches(){
  const el=document.getElementById('batch-list');
  const list=filteredBatches();
  if(!list.length){
    const msg=activeFilter==='finished'?'No finished brews yet.':activeFilter==='inprogress'?'No brews in progress.':'No brews yet. Tap "+ New" to get started.';
    el.innerHTML=`<div class="empty"><div class="empty-title">${msg}</div></div>`;return;
  }
  el.innerHTML=list.slice().reverse().map(b=>{
    const abv=calcABV(b);
    const readings=b.sgReadings||[];
    const lastSG=readings.length?readings[readings.length-1].val:(b.startingSG||'—');
    const st=STATUS[b.status||'primary'];
    const stageDate=(b.stageStartDates||{})[b.status];
    const days=stageDate?daysSince(stageDate):null;
    const dayStr=days!==null&&b.status!=='bottled'?(days===0?'today':days+'d in stage'):'';
    const oc=overdueCount(b);
    const hasRealOverdue=(b.nutrientSchedule||[]).some(d=>!d.done&&d.date<today());
    const overdueHTML=oc>0?`<span class="${hasRealOverdue?'overdue-badge':'due-today-badge'}">${oc} dose${oc>1?'s':''} due</span>`:'';
    return `<div class="batch-card ${st.cardCls}" onclick="showDetail('${b.id}')">
      <div class="batch-row">
        <span class="batch-name">${b.name}</span>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">${overdueHTML}<span class="status-pill ${st.cls}">${st.short}</span></div>
      </div>
      <div class="batch-date">${b.startDate||'No date'} · ${b.qty||'—'}${dayStr?' · '+dayStr:''}</div>
      <div class="meta-row">
        <span class="meta">Yeast: <b>${b.yeast||'—'}</b></span>
        <span class="meta">SG: <b>${lastSG}</b></span>
        ${abv?`<span class="abv-pill">~${abv}% ABV</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function saveBatch(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Please add a batch name.');return;}
  const sg=document.getElementById('f-sg').value.trim();
  const startDate=document.getElementById('f-date').value||today();
  const b={
    id:Date.now().toString(),name,
    qty:document.getElementById('f-qty').value.trim(),startDate,
    juice:document.getElementById('f-juice').value.trim(),
    campden:document.getElementById('f-campden').value.trim(),
    pectic:document.getElementById('f-pectic').value.trim(),
    acid:document.getElementById('f-acid').value.trim(),
    prefermOther:document.getElementById('f-preferm-other').value.trim(),
    yeast:document.getElementById('f-yeast').value.trim(),
    sugarType:document.getElementById('f-sugar-type').value.trim(),
    sugarQty:document.getElementById('f-sugar-qty').value.trim(),
    initialNutrient:document.getElementById('f-initial-nutrient').value.trim(),
    pitchOther:document.getElementById('f-pitch-other').value.trim(),
    startingSG:sg,
    notes:document.getElementById('f-notes').value.trim(),
    sgReadings:[],nutrientLog:[],nutrientSchedule:[],ingredientLog:[],
    status:'primary',stageStartDates:{primary:startDate},stageHistory:[]
  };
  if(sg)b.sgReadings.push({date:startDate,val:sg});
  batches.push(b);save();
  ['f-name','f-qty','f-juice','f-campden','f-pectic','f-acid','f-preferm-other','f-yeast','f-sugar-type','f-sugar-qty','f-initial-nutrient','f-pitch-other','f-sg','f-notes'].forEach(id=>document.getElementById(id).value='');
  renderBatches();showTab('batches');
}

function syncBatch(){
  const idx=batches.findIndex(b=>b.id===currentBatch.id);
  if(idx>=0)batches[idx]=currentBatch;
  save();
}

function setStatus(s){
  const prev=currentBatch.status;if(prev===s)return;
  const prevStart=(currentBatch.stageStartDates||{})[prev];
  const duration=prevStart?daysBetween(prevStart,today()):null;
  currentBatch.stageHistory=currentBatch.stageHistory||[];
  currentBatch.stageHistory.push({stage:prev,startDate:prevStart||today(),endDate:today(),days:duration});
  currentBatch.status=s;
  if(!currentBatch.stageStartDates)currentBatch.stageStartDates={};
  if(!currentBatch.stageStartDates[s])currentBatch.stageStartDates[s]=today();
  syncBatch();renderDetail();renderBatches();
}

/* ---- EDIT DETAILS ---- */
function showEditDetails(){
  const b=currentBatch;
  const el=document.getElementById('edit-details-panel');
  if(!el)return;
  el.innerHTML=`
    <div class="form-wrap" style="margin-top:1rem">
      <div class="form-section-label">Brew info</div>
      <div class="form-group"><label class="form-label">Batch name</label><input id="e-name" value="${b.name||''}" /></div>
      <div class="row2">
        <div class="form-group"><label class="form-label">Quantity</label><input id="e-qty" value="${b.qty||''}" /></div>
        <div class="form-group"><label class="form-label">Start date</label><input id="e-date" type="date" value="${b.startDate||''}" /></div>
      </div>
      <div class="form-group"><label class="form-label">Apple juice / base</label><input id="e-juice" value="${b.juice||''}" placeholder="Brand, type, volume..." /></div>
    </div>
    <div class="form-wrap">
      <div class="form-section-label">Pre-fermentation</div>
      <p class="form-hint">Added before pitching yeast</p>
      <div class="row2">
        <div class="form-group"><label class="form-label">Campden tablets</label><input id="e-campden" value="${b.campden||''}" placeholder="e.g. 1 tablet" /></div>
        <div class="form-group"><label class="form-label">Pectic enzyme</label><input id="e-pectic" value="${b.pectic||''}" placeholder="e.g. 0.5 tsp" /></div>
      </div>
      <div class="form-group"><label class="form-label">Acid blend</label><input id="e-acid" value="${b.acid||''}" placeholder="e.g. 1 tsp" /></div>
      <div class="form-group"><label class="form-label">Other pre-ferm additions</label><input id="e-preferm-other" value="${b.prefermOther||''}" placeholder="e.g. Bentonite, tannin..." /></div>
    </div>
    <div class="form-wrap">
      <div class="form-section-label">At pitch</div>
      <p class="form-hint">Added when pitching yeast</p>
      <div class="form-group"><label class="form-label">Yeast</label><input id="e-yeast" value="${b.yeast||''}" placeholder="Fleischmann's, EC-1118..." /></div>
      <div class="row2">
        <div class="form-group"><label class="form-label">Sugar type</label><input id="e-sugar-type" value="${b.sugarType||''}" placeholder="Brown sugar, honey..." /></div>
        <div class="form-group"><label class="form-label">Sugar quantity</label><input id="e-sugar-qty" value="${b.sugarQty||''}" placeholder="200g, 1 cup..." /></div>
      </div>
      <div class="form-group"><label class="form-label">Initial nutrient addition</label><input id="e-initial-nutrient" value="${b.initialNutrient||''}" placeholder="e.g. 2g Fermaid-O" /></div>
      <div class="form-group"><label class="form-label">Other at-pitch additions</label><input id="e-pitch-other" value="${b.pitchOther||''}" placeholder="e.g. Energizer, Go-Ferm..." /></div>
    </div>
    <div class="form-wrap">
      <div class="form-section-label">Fermentation</div>
      <div class="form-group"><label class="form-label">Starting SG</label><input id="e-sg" type="number" step="0.001" value="${b.startingSG||''}" placeholder="1.055" /></div>
    </div>
    <button class="btn-primary" onclick="saveEditDetails()">Save changes</button>
    <button class="btn-secondary" onclick="cancelEditDetails()">Cancel</button>
  `;
  el.style.display='block';
  document.getElementById('edit-details-btn').style.display='none';
  document.getElementById('ingredients-display').style.display='none';
}

function cancelEditDetails(){
  const el=document.getElementById('edit-details-panel');
  if(el)el.style.display='none';
  document.getElementById('edit-details-btn').style.display='';
  document.getElementById('ingredients-display').style.display='';
}

function saveEditDetails(){
  const b=currentBatch;
  const nameVal=document.getElementById('e-name').value.trim();
  if(!nameVal){alert('Batch name is required.');return;}
  b.name=nameVal;
  b.qty=document.getElementById('e-qty').value.trim();
  b.startDate=document.getElementById('e-date').value;
  b.juice=document.getElementById('e-juice').value.trim();
  b.campden=document.getElementById('e-campden').value.trim();
  b.pectic=document.getElementById('e-pectic').value.trim();
  b.acid=document.getElementById('e-acid').value.trim();
  b.prefermOther=document.getElementById('e-preferm-other').value.trim();
  b.yeast=document.getElementById('e-yeast').value.trim();
  b.sugarType=document.getElementById('e-sugar-type').value.trim();
  b.sugarQty=document.getElementById('e-sugar-qty').value.trim();
  b.initialNutrient=document.getElementById('e-initial-nutrient').value.trim();
  b.pitchOther=document.getElementById('e-pitch-other').value.trim();
  b.startingSG=document.getElementById('e-sg').value.trim();
  syncBatch();renderDetail();renderBatches();
}

/* ---- STAGE TIMER ---- */
function stageTimerHTML(b){
  const s=b.status;if(s==='bottled')return'';
  const st=STATUS[s];
  const stageDate=(b.stageStartDates||{})[s];
  const days=stageDate?daysSince(stageDate):null;
  const numStr=days===null?'—':days===0?'<1':String(days);
  const unit=days===1?'day':'days';
  return `<div class="stage-timer ${st.timerCls}">
    <div style="flex:1">
      <div class="stage-timer-label">Time in stage</div>
      <div class="stage-timer-name">${st.label}</div>
      <div class="stage-date-row">
        <span class="stage-timer-since">${stageDate?'since '+stageDate:'no date set'}</span>
        <button class="stage-date-edit-btn" onclick="editStageDate()">Edit</button>
      </div>
    </div>
    <div class="stage-days"><div class="stage-days-num">${numStr}</div><div class="stage-days-unit">${unit}</div></div>
  </div>`;
}

function editStageDate(){
  const b=currentBatch;const s=b.status;if(s==='bottled')return;
  const st=STATUS[s];
  const stageDate=(b.stageStartDates||{})[s];
  const days=stageDate?daysSince(stageDate):null;
  const numStr=days===null?'—':days===0?'<1':String(days);
  const unit=days===1?'day':'days';
  document.querySelector('.stage-timer').innerHTML=`
    <div style="flex:1">
      <div class="stage-timer-label">Time in stage</div>
      <div class="stage-timer-name">${st.label}</div>
      <div class="stage-date-input-row">
        <input type="date" id="stage-date-input" value="${stageDate||today()}" max="${today()}" />
        <button class="stage-date-save-btn" onclick="saveStageDate('${s}')">Save</button>
        <button class="stage-date-save-btn" style="background:none;color:var(--text-muted);border:1px solid var(--border)" onclick="renderDetail()">Cancel</button>
      </div>
    </div>
    <div class="stage-days"><div class="stage-days-num">${numStr}</div><div class="stage-days-unit">${unit}</div></div>
  `;
}

function saveStageDate(s){
  const input=document.getElementById('stage-date-input');
  if(!input||!input.value)return;
  if(!currentBatch.stageStartDates)currentBatch.stageStartDates={};
  currentBatch.stageStartDates[s]=input.value;
  syncBatch();renderDetail();renderBatches();
}

/* ---- DOSE BANNERS ---- */
function doseBannersHTML(b){
  const sched=b.nutrientSchedule||[];
  const overdue=sched.filter(d=>!d.done&&d.date<today());
  const dueToday=sched.filter(d=>!d.done&&d.date===today());
  let html='';
  if(overdue.length)html+=`<div class="overdue-banner"><div class="overdue-banner-title">Nutrient dose${overdue.length>1?'s':''} overdue</div>${overdue.map(d=>`<div class="overdue-banner-item">• ${d.amount}${d.unit?' '+d.unit:''} — was due ${d.date}</div>`).join('')}</div>`;
  if(dueToday.length)html+=`<div class="due-today-banner"><div class="due-today-banner-title">Nutrient dose${dueToday.length>1?'s':''} due today</div>${dueToday.map(d=>`<div class="due-today-banner-item">• ${d.amount}${d.unit?' '+d.unit:''}</div>`).join('')}</div>`;
  return html;
}

/* ---- INGREDIENTS DISPLAY ---- */
function ingredientsDisplayHTML(b){
  const preferm=[
    {name:'Campden tablets',val:b.campden},
    {name:'Pectic enzyme',val:b.pectic},
    {name:'Acid blend',val:b.acid},
    {name:'Other',val:b.prefermOther},
  ].filter(i=>i.val);
  const atpitch=[
    {name:'Yeast',val:b.yeast},
    {name:'Sugar',val:b.sugarType?(b.sugarType+(b.sugarQty?' — '+b.sugarQty:'')):null},
    {name:'Initial nutrient',val:b.initialNutrient},
    {name:'Other',val:b.pitchOther},
  ].filter(i=>i.val);
  const base=[
    {name:'Apple juice / base',val:b.juice},
  ].filter(i=>i.val);

  let html='';
  if(base.length||preferm.length||atpitch.length){
    html+=`<div class="ing-section">`;
    if(base.length){
      html+=`<div class="ing-section-head">Base</div>`;
      html+=base.map(i=>`<div class="ing-row"><span class="ing-name">${i.name}</span><span class="ing-val">${i.val}</span></div>`).join('');
    }
    if(preferm.length){
      html+=`<div class="ing-section-head">Pre-fermentation</div>`;
      html+=preferm.map(i=>`<div class="ing-row"><span class="ing-name">${i.name}</span><span class="ing-val">${i.val}</span></div>`).join('');
    }
    if(atpitch.length){
      html+=`<div class="ing-section-head">At pitch</div>`;
      html+=atpitch.map(i=>`<div class="ing-row"><span class="ing-name">${i.name}</span><span class="ing-val">${i.val}</span></div>`).join('');
    }
    html+=`</div>`;
  }
  return html;
}

/* ---- NUTRIENT SECTION ---- */
function nutrientSectionHTML(b){
  const sched=(b.nutrientSchedule||[]).slice().sort((a,c)=>a.date.localeCompare(c.date));
  const log=(b.nutrientLog||[]).slice().sort((a,c)=>a.date.localeCompare(c.date));
  const schedRows=sched.length
    ? sched.map((d,i)=>{
        const st=doseStatus(d);
        const tagLabel={overdue:'Overdue',upcoming:'Upcoming','due-today':'Due today',done:'Done'}[st];
        return `<div class="sched-row ${st}">
          <div class="sched-left"><div class="sched-main">${d.amount}${d.unit?' '+d.unit:''}</div><div class="sched-date">${d.date}</div></div>
          <div class="sched-actions">
            <span class="sched-tag ${st}">${tagLabel}</span>
            ${!d.done?`<button class="done-btn" onclick="markDoseDone(${i})">Done</button>`:''}
            <button class="log-del" onclick="deleteScheduledDose(${i})">×</button>
          </div>
        </div>`;
      }).join('')
    : `<div class="log-empty">No doses scheduled yet.</div>`;
  const logRows=log.length
    ? log.slice().reverse().map((e,i,arr)=>`<div class="log-row"><div><div class="log-main">${e.amount}${e.unit?' '+e.unit:''}</div><div class="log-sub">${e.date}</div></div><div class="log-right"><button class="log-del" onclick="deleteNutrient(${arr.length-1-i})">×</button></div></div>`).join('')
    : `<div class="log-empty">No doses logged yet.</div>`;
  return `<div class="section-head">Yeast nutrient schedule</div>
  <p style="font-size:13px;color:var(--text-muted);margin-bottom:10px">Schedule upcoming doses — tap Done when added.</p>
  <div class="log-add">
    <input class="date-inp" id="sched-date" type="date" value="${today()}" />
    <input id="sched-amt" placeholder="Amount" />
    <input class="unit-inp" id="sched-unit" placeholder="Unit" />
    <button onclick="addScheduledDose()">+ Schedule</button>
  </div>
  <div class="log-list">${schedRows}</div>
  <div class="section-head">Nutrient additions log</div>
  <div class="log-add">
    <input class="date-inp" id="nut-date" type="date" value="${today()}" />
    <input id="nut-amt" placeholder="Amount" />
    <input class="unit-inp" id="nut-unit" placeholder="Unit" />
    <button onclick="addNutrient()">+ Log</button>
  </div>
  <div class="log-list">${logRows}</div>`;
}

/* ---- INGREDIENT LOG ---- */
function ingredientLogHTML(b){
  const log=(b.ingredientLog||[]).slice().sort((a,c)=>a.date.localeCompare(c.date));
  const rows=log.length
    ? log.slice().reverse().map((e,i,arr)=>`<div class="log-row"><div><div class="log-main">${e.name}${e.qty?' — '+e.qty+(e.unit?' '+e.unit:''):''}</div><div class="log-sub">${e.date}${e.note?' · '+e.note:''}</div></div><div class="log-right"><button class="log-del" onclick="deleteIngredient(${arr.length-1-i})">×</button></div></div>`).join('')
    : `<div class="log-empty">No additions logged yet.</div>`;
  return `<div class="section-head">Other ingredients / additions</div>
  <div class="log-add">
    <input class="date-inp" id="ing-date" type="date" value="${today()}" />
    <input id="ing-name" placeholder="Ingredient name" style="flex:2" />
    <input id="ing-qty" placeholder="Qty" style="width:60px;flex:none" />
    <input class="unit-inp" id="ing-unit" placeholder="Unit" />
    <input id="ing-note" placeholder="Note (optional)" style="width:100%;flex:none" />
    <button class="wide" onclick="addIngredient()">+ Add ingredient</button>
  </div>
  <div class="log-list">${rows}</div>`;
}

/* ---- STAGE HISTORY ---- */
function stageHistoryHTML(b){
  const history=b.stageHistory||[];
  const cur=b.status;
  const curStart=(b.stageStartDates||{})[cur];
  const curDays=curStart?daysSince(curStart):null;
  const rows=[...history.map(h=>({...h,ongoing:false})),{stage:cur,startDate:curStart||null,endDate:null,days:curDays,ongoing:cur!=='bottled'}];
  if(!rows.length)return'';
  const rowsHTML=rows.map(r=>{
    const st=STATUS[r.stage]||STATUS.primary;
    const dateRange=r.startDate?(r.endDate?r.startDate+' → '+r.endDate:r.startDate+' → now'):'—';
    const durStr=r.ongoing?fmtDuration(r.days)+' so far':fmtDuration(r.days);
    return `<div class="stage-history-row"><div class="sh-left"><div class="sh-dot s-${r.stage}"></div><div><div class="sh-name">${st.label}</div><div class="sh-dates">${dateRange}</div></div></div><div class="sh-duration${r.ongoing?' ongoing':''}">${durStr}</div></div>`;
  }).join('');
  return `<div class="section-head">Stage history</div><div class="stage-history">${rowsHTML}</div>`;
}

/* ---- RENDER DETAIL ---- */
function renderDetail(){
  const b=currentBatch;
  const abv=calcABV(b);
  const readings=(b.sgReadings||[]).slice().sort((a,c)=>a.date.localeCompare(c.date));
  const curStatus=b.status||'primary';
  document.getElementById('detail-content').innerHTML=`
    <div class="detail-header">
      <div class="detail-header-left">
        <div class="detail-title">${b.name}</div>
        <div class="detail-sub">Started ${b.startDate||'—'} · ${b.qty||'—'}</div>
      </div>
      <button id="edit-details-btn" class="edit-details-btn" onclick="showEditDetails()">Edit details</button>
    </div>

    <div id="edit-details-panel" style="display:none"></div>

    <div id="ingredients-display">
      ${doseBannersHTML(b)}
      ${stageTimerHTML(b)}
      <div class="section-head">Status</div>
      <div class="status-switcher">
        ${Object.entries(STATUS).map(([k,v])=>`<button class="status-opt${curStatus===k?' active '+v.optCls:''}" onclick="setStatus('${k}')">${v.label}</button>`).join('')}
      </div>
      <div class="info-grid">
        <div class="info-card"><div class="info-label">Starting SG</div><div class="info-val">${b.startingSG||'—'}</div></div>
        <div class="info-card"><div class="info-label">Est. ABV</div><div class="info-val">${abv?'~'+abv+'%':'—'}</div></div>
      </div>
      ${ingredientsDisplayHTML(b)}
    </div>

    <div class="section-head">SG readings</div>
    <div class="log-add">
      <input class="date-inp" id="new-sg-date" type="date" value="${today()}" />
      <input id="new-sg-val" placeholder="e.g. 1.010" type="number" step="0.001" />
      <button onclick="addSGReading()">+ Add</button>
    </div>
    <div class="chart-wrap"><canvas id="sg-chart"></canvas></div>
    <div class="log-list" style="margin-bottom:1.25rem">
      ${readings.length?readings.map((r,i,arr)=>{
        const prev=arr[i-1];let trend='';
        if(prev){const diff=parseFloat(r.val)-parseFloat(prev.val);trend=diff<-0.001?'<span class="sg-trend down">fermenting</span>':'<span class="sg-trend same">stable</span>';}
        return `<div class="log-row"><div class="log-sub" style="font-size:14px">${r.date}</div><div style="font-weight:600">${r.val}${trend}</div></div>`;
      }).join(''):`<div class="log-empty">No readings yet.</div>`}
    </div>

    ${stageHistoryHTML(b)}
    ${nutrientSectionHTML(b)}
    ${ingredientLogHTML(b)}
    ${tastingLogHTML(b)}

    <button class="delete-btn" onclick="deleteBatch('${b.id}')">Delete brew</button>
  `;
  setTimeout(()=>renderSGChart(readings),50);
}

/* ---- LOG ACTIONS ---- */
function addScheduledDose(){
  const date=document.getElementById('sched-date').value||today();
  const amount=document.getElementById('sched-amt').value.trim();
  const unit=document.getElementById('sched-unit').value.trim();
  if(!amount)return;
  currentBatch.nutrientSchedule=currentBatch.nutrientSchedule||[];
  currentBatch.nutrientSchedule.push({date,amount,unit,done:false});
  currentBatch.nutrientSchedule.sort((a,b)=>a.date.localeCompare(b.date));
  syncBatch();renderDetail();renderBatches();
}
function markDoseDone(idx){
  currentBatch.nutrientSchedule[idx].done=true;
  const d=currentBatch.nutrientSchedule[idx];
  currentBatch.nutrientLog=currentBatch.nutrientLog||[];
  currentBatch.nutrientLog.push({date:today(),amount:d.amount,unit:d.unit});
  currentBatch.nutrientLog.sort((a,b)=>a.date.localeCompare(b.date));
  syncBatch();renderDetail();renderBatches();
}
function deleteScheduledDose(idx){currentBatch.nutrientSchedule.splice(idx,1);syncBatch();renderDetail();renderBatches();}
function addNutrient(){
  const date=document.getElementById('nut-date').value||today();
  const amount=document.getElementById('nut-amt').value.trim();
  const unit=document.getElementById('nut-unit').value.trim();
  if(!amount)return;
  currentBatch.nutrientLog=currentBatch.nutrientLog||[];
  currentBatch.nutrientLog.push({date,amount,unit});
  currentBatch.nutrientLog.sort((a,b)=>a.date.localeCompare(b.date));
  syncBatch();renderDetail();
}
function deleteNutrient(idx){currentBatch.nutrientLog.splice(idx,1);syncBatch();renderDetail();}
function addIngredient(){
  const date=document.getElementById('ing-date').value||today();
  const name=document.getElementById('ing-name').value.trim();
  if(!name)return;
  const qty=document.getElementById('ing-qty').value.trim();
  const unit=document.getElementById('ing-unit').value.trim();
  const note=document.getElementById('ing-note').value.trim();
  currentBatch.ingredientLog=currentBatch.ingredientLog||[];
  currentBatch.ingredientLog.push({date,name,qty,unit,note});
  currentBatch.ingredientLog.sort((a,b)=>a.date.localeCompare(b.date));
  syncBatch();renderDetail();
}
function deleteIngredient(idx){currentBatch.ingredientLog.splice(idx,1);syncBatch();renderDetail();}
function addSGReading(){
  const date=document.getElementById('new-sg-date').value||today();
  const val=document.getElementById('new-sg-val').value.trim();
  if(!val)return;
  currentBatch.sgReadings=currentBatch.sgReadings||[];
  currentBatch.sgReadings.push({date,val});
  currentBatch.sgReadings.sort((a,b)=>a.date.localeCompare(b.date));
  syncBatch();renderDetail();
}
function tastingLogHTML(b){
  const log=(b.tastingLog||[]);
  const rows=log.length
    ? log.map((e,i)=>`<div class="log-row">
        <div style="flex:1"><div class="log-main" style="font-weight:400;font-size:14px">${e.note}</div><div class="log-sub">${e.date}</div></div>
        <div class="log-right"><button class="log-del" onclick="deleteTastingNote(${i})">x</button></div>
      </div>`).join('')
    : `<div class="log-empty">No notes yet.</div>`;
  return `<div class="section-head">Tasting notes &amp; observations</div>
  <div class="log-add" style="flex-wrap:wrap">
    <input class="date-inp" id="note-date" type="date" value="${today()}" />
    <textarea id="note-text" placeholder="Aroma, flavour, observations..." style="width:100%;flex:none;min-height:64px;margin-top:4px"></textarea>
    <button class="wide" onclick="addTastingNote()" style="margin-top:4px">+ Add note</button>
  </div>
  <div class="log-list">${rows}</div>`;
}

function addTastingNote(){
  const date=document.getElementById('note-date').value||today();
  const note=document.getElementById('note-text').value.trim();
  if(!note)return;
  currentBatch.tastingLog=currentBatch.tastingLog||[];
  currentBatch.tastingLog.push({date,note});
  syncBatch();renderDetail();
}

function deleteTastingNote(idx){
  currentBatch.tastingLog.splice(idx,1);
  syncBatch();renderDetail();
}
function deleteBatch(id){
  if(!confirm('Delete this brew?'))return;
  batches=batches.filter(b=>b.id!==id);
  save();renderBatches();showTab('batches');
}

/* ---- CHARTS ---- */
function renderSGChart(readings){
  const ctx=document.getElementById('sg-chart');
  if(!ctx)return;
  if(sgChart){sgChart.destroy();sgChart=null;}
  if(!readings.length)return;
  const sorted=readings.slice().sort((a,b)=>a.date.localeCompare(b.date));
  sgChart=new Chart(ctx,{type:'line',data:{
    labels:sorted.map(r=>r.date),
    datasets:[{label:'SG',data:sorted.map(r=>parseFloat(r.val)),borderColor:'#EF9F27',backgroundColor:'rgba(239,159,39,0.08)',pointBackgroundColor:'#C4711A',pointRadius:5,tension:0.35,fill:true}]
  },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
    x:{ticks:{font:{size:11}},grid:{display:false}},
    y:{ticks:{font:{size:11}},grid:{color:'rgba(196,113,26,0.1)'}}
  }}});
}

function renderStats(){
  const active=batches.filter(b=>b.status!=='bottled').length;
  const abvVals=batches.map(b=>calcABV(b)).filter(Boolean).map(Number);
  const avgABV=abvVals.length?(abvVals.reduce((a,b)=>a+b,0)/abvVals.length).toFixed(1):'—';
  const yeasts={};batches.forEach(b=>{if(b.yeast)yeasts[b.yeast]=(yeasts[b.yeast]||0)+1;});
  const topYeast=Object.entries(yeasts).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="stat-label">Total brews</div><div class="stat-val">${batches.length}</div></div>
    <div class="stat-card"><div class="stat-label">In progress</div><div class="stat-val">${active}</div></div>
    <div class="stat-card"><div class="stat-label">Avg ABV</div><div class="stat-val">${avgABV}<span class="stat-unit">%</span></div></div>
    <div class="stat-card"><div class="stat-label">Top yeast</div><div class="stat-val" style="font-size:14px">${topYeast?topYeast[0]:'—'}</div></div>
  `;
  const ctx=document.getElementById('stats-chart');
  if(statsChart){statsChart.destroy();statsChart=null;}
  const abvData=batches.filter(b=>calcABV(b)).map(b=>({name:b.name,abv:parseFloat(calcABV(b))}));
  if(!abvData.length)return;
  statsChart=new Chart(ctx,{type:'bar',data:{
    labels:abvData.map(b=>b.name),
    datasets:[{label:'Est. ABV %',data:abvData.map(b=>b.abv),backgroundColor:'rgba(196,113,26,0.75)',borderColor:'#C4711A',borderWidth:1,borderRadius:4}]
  },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
    x:{ticks:{font:{size:11}},grid:{display:false}},
    y:{beginAtZero:true,ticks:{font:{size:11},callback:v=>v+'%'},grid:{color:'rgba(196,113,26,0.1)'}}
  }}});
}

/* ---- CSV EXPORT ---- */
function exportCSV(){
  const rows=[['Batch','Quantity','Start date','Juice/base','Campden','Pectic enzyme','Acid blend','Pre-ferm other','Yeast','Sugar type','Sugar qty','Initial nutrient','Pitch other','Starting SG','Latest SG','Est. ABV%','Status','Scheduled doses','Nutrient additions','Other ingredients','Notes']];
  batches.forEach(b=>{
    const readings=b.sgReadings||[];
    const lastSG=readings.length?readings[readings.length-1].val:'';
    const scheduled=(b.nutrientSchedule||[]).map(d=>`${d.date}: ${d.amount}${d.unit?' '+d.unit:''}${d.done?' (done)':''}`).join('; ');
    const nutrients=(b.nutrientLog||[]).map(e=>`${e.date}: ${e.amount}${e.unit?' '+e.unit:''}`).join('; ');
    const ingredients=(b.ingredientLog||[]).map(e=>`${e.date}: ${e.name}${e.qty?' '+e.qty+(e.unit?' '+e.unit:''):''}`).join('; ');
    rows.push([b.name,b.qty||'',b.startDate||'',b.juice||'',b.campden||'',b.pectic||'',b.acid||'',b.prefermOther||'',b.yeast||'',b.sugarType||'',b.sugarQty||'',b.initialNutrient||'',b.pitchOther||'',b.startingSG||'',lastSG,calcABV(b)||'',STATUS[b.status]?.label||b.status,scheduled,nutrients,ingredients,(b.notes||'').replace(/"/g,'""')]);
  });
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='cider-log.csv';a.click();
  URL.revokeObjectURL(url);
}


/* ---- RECIPE FUNCTIONS ---- */

function renderRecipes(){
  const el=document.getElementById('recipe-list');
  const cnt=document.getElementById('recipe-count');
  if(cnt)cnt.textContent=recipes.length+' recipe'+(recipes.length!==1?'s':'');
  if(!recipes.length){
    el.innerHTML=`<div class="empty"><div class="empty-title">No recipes yet.</div><div class="empty-sub">Save a recipe to reuse your best brews.</div></div>`;
    return;
  }
  el.innerHTML=recipes.map(r=>`
    <div class="batch-card" style="border-left-color:#7F77DD" onclick="showRecipeDetail('${r.id}')">
      <div class="batch-row">
        <span class="batch-name">${r.name}</span>
        <span class="status-pill" style="background:#EEEDFE;color:#3C3489">Recipe</span>
      </div>
      ${r.juice?`<div class="batch-date">${r.juice}</div>`:''}
      <div class="meta-row">
        ${r.yeast?`<span class="meta">Yeast: <b>${r.yeast}</b></span>`:''}
        ${r.sugarType?`<span class="meta">Sugar: <b>${r.sugarType}</b></span>`:''}
      </div>
    </div>`).join('');
}

function showRecipeDetail(id){
  currentRecipe=recipes.find(r=>r.id===id);
  if(!currentRecipe)return;
  renderRecipeDetail();
  ['batches','add','stats','detail','recipes','recipe-add'].forEach(s=>document.getElementById('sec-'+s).classList.remove('visible'));
  document.getElementById('sec-recipe-detail').classList.add('visible');
}

function renderRecipeDetail(){
  const r=currentRecipe;
  const preferm=[
    {name:'Campden tablets',val:r.campden},
    {name:'Pectic enzyme',val:r.pectic},
    {name:'Acid blend',val:r.acid},
    {name:'Other',val:r.prefermOther},
  ].filter(i=>i.val);
  const atpitch=[
    {name:'Yeast',val:r.yeast},
    {name:'Sugar',val:r.sugarType?(r.sugarType+(r.sugarQty?' — '+r.sugarQty:'')):null},
    {name:'Initial nutrient',val:r.initialNutrient},
    {name:'Other',val:r.pitchOther},
  ].filter(i=>i.val);

  let ingHTML='<div class="ing-section">';
  if(r.juice) ingHTML+=`<div class="ing-section-head">Base</div><div class="ing-row"><span class="ing-name">Apple juice / base</span><span class="ing-val">${r.juice}</span></div>`;
  if(preferm.length){ingHTML+=`<div class="ing-section-head">Pre-fermentation</div>`;ingHTML+=preferm.map(i=>`<div class="ing-row"><span class="ing-name">${i.name}</span><span class="ing-val">${i.val}</span></div>`).join('');}
  if(atpitch.length){ingHTML+=`<div class="ing-section-head">At pitch</div>`;ingHTML+=atpitch.map(i=>`<div class="ing-row"><span class="ing-name">${i.name}</span><span class="ing-val">${i.val}</span></div>`).join('');}
  ingHTML+='</div>';

  document.getElementById('recipe-detail-content').innerHTML=`
    <div class="detail-header">
      <div class="detail-header-left">
        <div class="detail-title">${r.name}</div>
        ${r.notes?`<div class="detail-sub" style="margin-top:4px;font-style:italic">${r.notes}</div>`:''}
      </div>
      <button class="edit-details-btn" onclick="openEditRecipe('${r.id}')">Edit</button>
    </div>
    ${ingHTML}
    <button class="btn-primary" style="margin-top:1rem" onclick="startBrewFromRecipe('${r.id}')">Start brewing this recipe</button>
    <button class="delete-btn" style="margin-top:8px" onclick="deleteRecipe('${r.id}')">Delete recipe</button>
  `;
}

function showRecipeForm(recipe){
  editingRecipeId=recipe?recipe.id:null;
  document.getElementById('recipe-form-title').textContent=recipe?'Edit recipe':'New recipe';
  document.getElementById('rf-save-btn').textContent=recipe?'Save changes':'Save recipe';
  const fields={
    'rf-name':recipe?.name||'',
    'rf-juice':recipe?.juice||'',
    'rf-notes':recipe?.notes||'',
    'rf-campden':recipe?.campden||'',
    'rf-pectic':recipe?.pectic||'',
    'rf-acid':recipe?.acid||'',
    'rf-preferm-other':recipe?.prefermOther||'',
    'rf-yeast':recipe?.yeast||'',
    'rf-sugar-type':recipe?.sugarType||'',
    'rf-sugar-qty':recipe?.sugarQty||'',
    'rf-initial-nutrient':recipe?.initialNutrient||'',
    'rf-pitch-other':recipe?.pitchOther||''
  };
  Object.entries(fields).forEach(([id,val])=>{const el=document.getElementById(id);if(el)el.value=val;});
  showTab('recipe-add');
}

function openEditRecipe(id){
  const r=recipes.find(r=>r.id===id);
  if(r)showRecipeForm(r);
}

function cancelRecipeForm(){
  editingRecipeId?showTab('recipe-detail'):showTab('recipes');
}

function saveRecipe(){
  const name=document.getElementById('rf-name').value.trim();
  if(!name){alert('Please add a recipe name.');return;}
  const data={
    name,
    juice:document.getElementById('rf-juice').value.trim(),
    notes:document.getElementById('rf-notes').value.trim(),
    campden:document.getElementById('rf-campden').value.trim(),
    pectic:document.getElementById('rf-pectic').value.trim(),
    acid:document.getElementById('rf-acid').value.trim(),
    prefermOther:document.getElementById('rf-preferm-other').value.trim(),
    yeast:document.getElementById('rf-yeast').value.trim(),
    sugarType:document.getElementById('rf-sugar-type').value.trim(),
    sugarQty:document.getElementById('rf-sugar-qty').value.trim(),
    initialNutrient:document.getElementById('rf-initial-nutrient').value.trim(),
    pitchOther:document.getElementById('rf-pitch-other').value.trim()
  };
  if(editingRecipeId){
    const idx=recipes.findIndex(r=>r.id===editingRecipeId);
    if(idx>=0){recipes[idx]={...recipes[idx],...data};currentRecipe=recipes[idx];}
    saveRecipes();renderRecipeDetail();showTab('recipe-detail');
  } else {
    data.id=Date.now().toString();
    recipes.push(data);
    saveRecipes();renderRecipes();showTab('recipes');
  }
  editingRecipeId=null;
}

function deleteRecipe(id){
  if(!confirm('Delete this recipe?'))return;
  recipes=recipes.filter(r=>r.id!==id);
  saveRecipes();showTab('recipes');
}

function startBrewFromRecipe(id){
  const r=recipes.find(r=>r.id===id);
  if(!r)return;
  showTab('add');
  const fields={
    'f-juice':r.juice||'',
    'f-campden':r.campden||'',
    'f-pectic':r.pectic||'',
    'f-acid':r.acid||'',
    'f-preferm-other':r.prefermOther||'',
    'f-yeast':r.yeast||'',
    'f-sugar-type':r.sugarType||'',
    'f-sugar-qty':r.sugarQty||'',
    'f-initial-nutrient':r.initialNutrient||'',
    'f-pitch-other':r.pitchOther||''
  };
  Object.entries(fields).forEach(([id,val])=>{const el=document.getElementById(id);if(el)el.value=val;});
  document.getElementById('f-name').value='';
  document.getElementById('f-date').value=today();
  document.getElementById('f-qty').value='';
  document.getElementById('f-sg').value='';
  document.getElementById('f-notes').value=r.notes?'From recipe: '+r.name:'';
  document.getElementById('f-name').focus();
}
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js'));}
document.getElementById('f-date').value=today();
load();
</script>
